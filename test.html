<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>真实AI流式聊天测试</title>
    <style>
      body {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family: sans-serif;
      }
      #chat-box {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        height: 400px;
        overflow-y: auto;
        margin-bottom: 20px;
      }
      .user-msg {
        background: #e3f2fd;
        padding: 10px;
        border-radius: 8px;
        margin: 10px 0;
        text-align: right;
      }
      .ai-msg {
        background: #f5f5f5;
        padding: 10px;
        border-radius: 8px;
        margin: 10px 0;
      }
      #input-box {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
      }
      #send-btn {
        margin-top: 10px;
        padding: 10px 20px;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>真实AI聊天机器人（流式输出）</h2>
    <div id="chat-box"></div>
    <input type="text" id="input-box" placeholder="输入你的问题..." />
    <button id="send-btn">发送</button>

    <script>
      const chatBox = document.getElementById('chat-box')
      const inputBox = document.getElementById('input-box')
      const sendBtn = document.getElementById('send-btn')
      let chatHistory = [] // 存储对话历史

      // 发送消息并获取AI流式回复
      async function sendMessage() {
        const userMsg = inputBox.value.trim()
        if (!userMsg) return

        // 清空输入框
        inputBox.value = ''

        // 添加用户消息到聊天框
        chatBox.innerHTML += `<div class="user-msg">你：${userMsg}</div>`
        chatBox.scrollTop = chatBox.scrollHeight

        // 添加到对话历史
        chatHistory.push({ role: 'user', content: userMsg })

        // 创建AI回复容器
        const aiMsgId = `ai-${Date.now()}`
        chatBox.innerHTML += `<div class="ai-msg" id="${aiMsgId}">AI：</div>`
        chatBox.scrollTop = chatBox.scrollHeight
        const aiMsgDom = document.getElementById(aiMsgId)

        try {
          // 调用真实AI流式接口
          const res = await fetch('http://127.0.0.1:8000/api/ai/real_stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: userMsg, history: chatHistory }),
          })

          if (!res.ok) throw new Error(`HTTP错误：${res.status}`)

          const reader = res.body.getReader()
          const decoder = new TextDecoder()
          let aiReply = ''

          // 逐字接收并渲染
          while (true) {
            const { done, value } = await reader.read()
            if (done) break

            aiReply += decoder.decode(value)
            aiMsgDom.innerHTML = `AI：${aiReply}`
            chatBox.scrollTop = chatBox.scrollHeight
          }

          // 添加AI回复到对话历史
          chatHistory.push({ role: 'assistant', content: aiReply })
        } catch (error) {
          aiMsgDom.innerHTML = `AI：❌ 出错了：${error.message}`
        }
      }

      // 绑定事件
      sendBtn.addEventListener('click', sendMessage)
      inputBox.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage()
      })

      // 初始欢迎消息
      chatBox.innerHTML += `<div class="ai-msg">AI：你好！我是真实的AI助手，有什么可以帮你？</div>`
    </script>
  </body>
</html>
